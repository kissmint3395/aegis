name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  security:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        run: |
          curl -sSfL "https://github.com/betterleaks/betterleaks/releases/download/v1.1.2/betterleaks_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin betterleaks

      - name: Run Betterleaks
        run: betterleaks detect --no-banner -c .betterleaks.toml

  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/phpunit

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse
        if: matrix.php == '8.3'
